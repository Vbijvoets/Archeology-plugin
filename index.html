<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0e0c09">
  <meta name="description" content="Track RuneScape Archaeology collections, restoration materials, XP and chronotes in one private browser-based planner.">
  <meta name="google-adsense-account" content="ca-pub-3112681455071923">
  <link rel="canonical" href="https://archeology-collections.fun/">
  <meta property="og:title" content="Archaeology Collections">
  <meta property="og:description" content="Plan restorations. Track every find.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://archeology-collections.fun/">
  <meta property="og:image" content="https://archeology-collections.fun/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Archaeology Collections">
  <meta name="twitter:description" content="Plan restorations. Track every find.">
  <meta name="twitter:image" content="https://archeology-collections.fun/og.png">
  <title>Archaeology Collections Tracker</title>
  <link rel="icon" type="image/png" href="dist/icon.png">
  <link rel="stylesheet" href="dist/styles.css">
  <link rel="stylesheet" href="dist/ads.css">
  <link rel="stylesheet" href="website.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3112681455071923" crossorigin="anonymous"></script>
</head>
<body class="website">
  <header class="app-header">
    <div><p class="eyebrow">COLLECTION TRACKER</p><h1>Archaeology Collections</h1></div>
    <a class="ghost install-link" href="alt1://addapp/https://archeology-collections.fun/dist/appconfig.json">Add to Alt1</a>
    <button id="installBtn" class="ghost" hidden>Add to Alt1</button>
  </header>
  <nav class="tabs" aria-label="Tracker menu">
    <button data-view="collections" class="active">Collections</button>
    <button data-view="materials">Materials</button>
    <button data-view="summary">Summary</button>
  </nav>
  <main>
    <section id="collectionsView" class="view active">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search collection or artefact…" aria-label="Search">
        <select id="groupFilter" aria-label="Collection type"><option value="all">All</option><option value="Collectors">Collectors</option><option value="Museum">Museum</option></select>
      </div>
      <div class="layout">
        <aside id="collectionList" class="collection-list" aria-label="Collections"></aside>
        <article id="collectionDetail" class="detail"></article>
      </div>
    </section>
    <section id="materialsView" class="view"><div id="materialsContent"></div></section>
    <section id="summaryView" class="view"><div id="summaryContent"></div></section>
  </main>
  <aside id="adSlot" class="ad-slot" aria-label="Advertisement" hidden><span class="ad-label">Advertisement</span><div id="adMount" class="ad-mount"></div></aside>
  <footer class="tracker-footer"><span id="saveStatus">Saved in this browser</span><div><button id="exportBtn" type="button" class="link-button">Export</button><label class="link-button file-label">Import<input id="importInput" type="file" accept="application/json"></label><button id="resetBtn" type="button" class="link-button danger">Reset</button></div></footer>
  <section class="privacy-note" id="privacy" aria-labelledby="privacy-title">
    <div><span>Privacy</span><h2 id="privacy-title">Your progress stays on your device</h2></div>
    <p>Artefact counts are stored in your browser's local storage. They are not sent to this website. Use Export to move your progress to another browser or device.</p>
  </section>
  <script src="dist/data.js"></script><script src="dist/app.js"></script><script src="dist/adconfig.js"></script><script src="dist/ad-loader.js"></script>
</body>
</html>
