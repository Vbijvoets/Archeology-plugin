<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#17130d">
  <meta name="google-adsense-account" content="ca-pub-3112681455071923">
  <title>Archaeology Collections</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="ads.css">
  <style>
    .collection-materials{height:160px;margin:12px 0;padding:10px;border:1px solid var(--line);border-radius:5px;background:#100d09;overflow:auto;scrollbar-gutter:stable}
    .collection-materials h3{margin:0 0 8px;font:15px Georgia,serif;color:var(--gold2)}
    .material-chips{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:6px}
    .material-chip{display:flex;justify-content:space-between;gap:8px;padding:6px 8px;border:1px solid #302719;border-radius:4px;background:var(--panel2)}
    .material-chip span,.materials-empty{color:var(--muted)}
    .material-chip strong{color:var(--gold2)}
    .materials-empty{margin:0;font-size:12px}
  </style>
</head>
<body>
  <header class="app-header">
    <div><h1>Archaeology Collections</h1></div>
    <button id="installBtn" class="ghost" hidden>Add to Alt1</button>
  </header>
  <nav class="tabs" aria-label="Main menu">
    <button data-view="collections" class="active">Collections</button>
    <button data-view="materials">Materials</button>
    <button data-view="summary">Summary</button>
  </nav>
  <main>
    <section id="collectionsView" class="view active">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search collection or artefact…" aria-label="Search">
        <select id="groupFilter" aria-label="Collection type"><option value="all">All</option><option value="Collectors">Collectors</option><option value="Museum">Museum</option></select>
      </div>
      <div class="layout">
        <aside id="collectionList" class="collection-list" aria-label="Collections"></aside>
        <article id="collectionDetail" class="detail"></article>
      </div>
    </section>
    <section id="materialsView" class="view"><div id="materialsContent"></div></section>
    <section id="summaryView" class="view"><div id="summaryContent"></div></section>
  </main>
  <aside id="adSlot" class="ad-slot" aria-label="Advertisement" hidden>
    <span class="ad-label">Advertisement</span>
    <div id="adMount" class="ad-mount"></div>
  </aside>
  <footer><span id="saveStatus">Saved locally</span><div><button id="exportBtn" type="button" class="link-button">Export</button><label class="link-button file-label">Import<input id="importInput" type="file" accept="application/json"></label><button id="resetBtn" type="button" class="link-button danger">Reset</button></div></footer>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="adconfig.js"></script>
  <script src="ad-loader.js"></script>
</body>
</html>
